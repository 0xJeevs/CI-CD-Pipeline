apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      imagePullSecrets:
      - name: ecr-secret

      containers:
      - name: flask-app
        image:996680283278.dkr.ecr.us-east-1.amazonaws.com/flask-app:3d179506d253c7d47d5af4d7fbaae5399d13ea61
        ports:
        - containerPort: 5000
