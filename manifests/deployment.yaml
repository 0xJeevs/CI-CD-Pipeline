apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      imagePullSecrets:
      - name: ecr-secret

      containers:
      - name: flask-app
        image:996680283278.dkr.ecr.us-east-1.amazonaws.com/flask-app:8bf7c3ea3775e5fd64ba6caf33095940ce6aba8e
        ports:
        - containerPort: 5000
