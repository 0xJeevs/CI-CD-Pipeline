apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image:996680283278.dkr.ecr.us-east-1.amazonaws.com/flask-app:f8936271836156fc693ff4a95d4f3d5e78173cab
        ports:
        - containerPort: 5000
